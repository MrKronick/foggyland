<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoggyLand — Технические работы 🛠️</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, #1a2e0f, #2d3e1f);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      overflow: hidden;
      position: relative;
    }
    .fog {
      position: absolute;
      background: radial-gradient(ellipse, rgba(255,255,240,0.15) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(40px);
      animation: float 20s infinite alternate ease-in-out;
    }
    .fog:nth-child(1) { width: 600px; height: 250px; top: 10%; left: -5%; }
    .fog:nth-child(2) { width: 500px; height: 300px; bottom: 10%; right: -5%; animation-delay: -5s; }
    .fog:nth-child(3) { width: 400px; height: 200px; top: 50%; left: 30%; animation-delay: -10s; }
    @keyframes float {
      0% { transform: translate(0,0) scale(1); opacity: 0.3; }
      100% { transform: translate(3%,2%) scale(1.05); opacity: 0.5; }
    }
    .card {
      background: rgba(255, 255, 245, 0.1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 2rem;
      padding: 3rem 2rem;
      text-align: center;
      box-shadow: 0 25px 50px -10px rgba(0,0,0,0.4);
      border: 1px solid rgba(200, 160, 50, 0.3);
      z-index: 2;
      max-width: 500px;
      margin: 1rem;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #c2a44a, #ffd966);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.1rem;
      color: #d4dca8;
      margin-bottom: 2rem;
      line-height: 1.5;
    }
    .reload-btn {
      display: inline-block;
      background: rgba(200, 160, 50, 0.15);
      border: 1px solid #c2a44a;
      color: #ffecaa;
      padding: 0.7rem 2rem;
      border-radius: 2rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
      cursor: pointer;
    }
    .reload-btn:hover {
      background: rgba(200, 160, 50, 0.3);
      box-shadow: 0 0 20px rgba(200, 170, 50, 0.3);
      transform: translateY(-2px);
    }
    .footer {
      position: absolute;
      bottom: 1rem;
      color: #7fa052;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="fog"></div>
  <div class="fog"></div>
  <div class="fog"></div>

  <div class="card">
    <h1>🛠️ Технические работы</h1>
    <p>Сайт FoggyLand временно недоступен.<br>Мы проводим обновление, чтобы сделать его ещё лучше.<br>Пожалуйста, зайдите позже.</p>
    <a class="reload-btn" onclick="location.reload()">Обновить страницу</a>
  </div>
  <div class="footer">FoggyLand &copy; 2026</div>
</body>
</html>
